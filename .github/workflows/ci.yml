name: ci

on:
  push:
    branches: [main]
  pull_request:


permissions:
  contents: read
jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
          components: rustfmt, clippy

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bash jq shellcheck

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash jq shellcheck

      - name: Print versions
        run: |
          bash --version | head -n1
          jq --version
          shellcheck --version | head -n3

      # showy-quota requires Homebrew bash on macOS, but the macOS image's
      # default /bin/bash is 3.2. Force-run make with the Homebrew bash from
      # brew install above by prepending its bin to PATH.
      - name: Set PATH (macOS Homebrew bash)
        if: runner.os == 'macOS'
        run: |
          BREW_PREFIX=$(brew --prefix)
          echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"

      - name: make lint
        run: make lint

      - name: make test
        run: make test

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo audit
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-audit --locked
          # RUSTSEC-2026-0009 (time <0.3.47) is a stack-exhaustion DoS reachable
          # only via RFC 2822 parsing of malicious input. This workspace parses
          # only RFC 3339 / ISO-8601 and custom format descriptions from local
          # CodexBar data and never uses the RFC 2822 parser. The patched release
          # requires Rust 1.88 while the workspace MSRV is 1.80, so the time pin
          # is held and this advisory is ignored until MSRV is raised.
          cargo audit --ignore RUSTSEC-2026-0009

      - name: make plugin
        run: make plugin

      - name: check plugin exports
        run: |
          python3 - <<'PY'
          from pathlib import Path

          wasm = Path("target/wasm32-wasip1/release/showy-quota-zellij.wasm")
          data = wasm.read_bytes()
          assert data[:8] == b"\0asm\x01\0\0\0", "not a WebAssembly module"

          def uleb(offset):
              value = 0
              shift = 0
              while True:
                  byte = data[offset]
                  offset += 1
                  value |= (byte & 0x7F) << shift
                  if byte < 0x80:
                      return value, offset
                  shift += 7

          exports = set()
          offset = 8
          while offset < len(data):
              section_id = data[offset]
              offset += 1
              section_size, offset = uleb(offset)
              section_end = offset + section_size
              if section_id == 7:
                  count, offset = uleb(offset)
                  for _ in range(count):
                      name_len, offset = uleb(offset)
                      name = data[offset:offset + name_len].decode()
                      offset += name_len
                      offset += 1
                      _, offset = uleb(offset)
                      exports.add(name)
              offset = section_end

          required = {"_start", "load", "update", "render", "plugin_version"}
          missing = required - exports
          assert not missing, f"missing WASM exports: {sorted(missing)}"
          PY
