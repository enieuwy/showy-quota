name: ci

on:
  push:
    branches: [main]
  pull_request:


permissions:
  contents: read
jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          toolchain: stable
          targets: wasm32-wasip1
          components: rustfmt, clippy

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bash jq

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash jq

      # Pin shellcheck to a fixed version so the lint gate is identical on
      # every leg and matches a local `make lint`. Distro packages drift
      # (Ubuntu's apt shellcheck lagged and flagged SC2015 where newer
      # releases do not), which let lint pass locally but fail in CI.
      - name: Install shellcheck (pinned)
        env:
          SHELLCHECK_VERSION: "0.11.0"
        run: |
          set -euo pipefail
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64)   asset="linux.x86_64" ;;
            macOS-ARM64) asset="darwin.aarch64" ;;
            macOS-X64)   asset="darwin.x86_64" ;;
            *) echo "unsupported runner: ${RUNNER_OS}-${RUNNER_ARCH}"; exit 1 ;;
          esac
          url="https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.${asset}.tar.xz"
          curl -fsSL "$url" -o /tmp/shellcheck.tar.xz
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install -m 0755 "/tmp/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck

      - name: Print versions
        run: |
          bash --version | head -n1
          jq --version
          shellcheck --version | head -n3

      # showy-quota requires Homebrew bash on macOS, but the macOS image's
      # default /bin/bash is 3.2. Force-run make with the Homebrew bash from
      # brew install above by prepending its bin to PATH.
      - name: Set PATH (macOS Homebrew bash)
        if: runner.os == 'macOS'
        run: |
          BREW_PREFIX=$(brew --prefix)
          echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"

      - name: make lint
        run: make lint

      - name: make test
        run: make test

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: make plugin
        run: make plugin

      - name: check plugin exports
        run: python3 scripts/check_plugin_exports.py
