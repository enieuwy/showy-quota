name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  zellij-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          toolchain: stable
          targets: wasm32-wasip1
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
      - name: Build Zellij plugin
        run: |
          cargo build --release --target wasm32-wasip1 -p showy-quota-zellij
          cp target/wasm32-wasip1/release/showy-quota-zellij.wasm showy-quota-zellij.wasm
      - name: Write artifact checksum
        run: sha256sum showy-quota-zellij.wasm > showy-quota-zellij.wasm.sha256
      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
      - name: Check plugin exports
        run: |
          python3 - <<'PY'
          from pathlib import Path

          wasm = Path("showy-quota-zellij.wasm")
          data = wasm.read_bytes()
          assert data[:8] == b"\0asm\x01\0\0\0", "not a WebAssembly module"

          def uleb(offset):
              value = 0
              shift = 0
              while True:
                  byte = data[offset]
                  offset += 1
                  value |= (byte & 0x7F) << shift
                  if byte < 0x80:
                      return value, offset
                  shift += 7

          exports = set()
          offset = 8
          while offset < len(data):
              section_id = data[offset]
              offset += 1
              section_size, offset = uleb(offset)
              section_end = offset + section_size
              if section_id == 7:
                  count, offset = uleb(offset)
                  for _ in range(count):
                      name_len, offset = uleb(offset)
                      name = data[offset:offset + name_len].decode()
                      offset += name_len
                      offset += 1
                      _, offset = uleb(offset)
                      exports.add(name)
              offset = section_end

          required = {"_start", "load", "update", "render", "plugin_version"}
          missing = required - exports
          assert not missing, f"missing WASM exports: {sorted(missing)}"
          PY
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: showy-quota-zellij.wasm
      - name: Attach plugin artifact
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            showy-quota-zellij.wasm
            showy-quota-zellij.wasm.sha256

  package:
    name: package (${{ matrix.package_target }})
    needs: zellij-plugin
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            package_target: macos-arm64
            cargo_target: ''
            render_bin: target/release/showy-quota-render
          - os: macos-14
            package_target: macos-x86_64
            cargo_target: x86_64-apple-darwin
            render_bin: target/x86_64-apple-darwin/release/showy-quota-render
          - os: ubuntu-latest
            package_target: linux-x86_64
            cargo_target: ''
            render_bin: target/release/showy-quota-render
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          toolchain: stable
      - name: Add Rust target
        if: matrix.cargo_target != ''
        run: rustup target add "${{ matrix.cargo_target }}"
      - name: Build render binary
        env:
          CARGO_TARGET: ${{ matrix.cargo_target }}
        run: |
          if [ -n "${CARGO_TARGET}" ]; then
            cargo build --release --target "${CARGO_TARGET}" -p showy-quota-zellij-core --bin showy-quota-render
          else
            cargo build --release -p showy-quota-zellij-core --bin showy-quota-render
          fi
      - name: Derive package version
        id: version
        run: printf 'version=%s\n' "${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"
      - name: Package release tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.package_target }}
          RENDER_BIN: ${{ matrix.render_bin }}
          OUT_DIR: dist
        run: scripts/package-release.sh
      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-package-${{ matrix.package_target }}
          if-no-files-found: error
          path: |
            dist/showy-quota-${{ steps.version.outputs.version }}-${{ matrix.package_target }}.tar.gz
            dist/showy-quota-${{ steps.version.outputs.version }}-${{ matrix.package_target }}.tar.gz.sha256
      - name: Attach package artifact
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/showy-quota-${{ steps.version.outputs.version }}-${{ matrix.package_target }}.tar.gz
            dist/showy-quota-${{ steps.version.outputs.version }}-${{ matrix.package_target }}.tar.gz.sha256

  smoke:
    name: smoke (${{ matrix.package_target }})
    needs: package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            package_target: macos-arm64
          - os: ubuntu-latest
            package_target: linux-x86_64
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install smoke dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bash jq
      - name: Install smoke dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash jq
          echo "$(brew --prefix)/bin" >> "${GITHUB_PATH}"
      - name: Derive package version
        id: version
        run: printf 'version=%s\n' "${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"
      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-package-${{ matrix.package_target }}
          path: "${{ runner.temp }}/package"
      - name: Install copied tree and smoke test
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.package_target }}
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/package/showy-quota-${VERSION}-${TARGET}.tar.gz"
          extract_dir="${RUNNER_TEMP}/extract"
          prefix="${RUNNER_TEMP}/prefix"
          mkdir -p "${extract_dir}" "${prefix}/bin"
          tar -xzf "${archive}" -C "${extract_dir}"
          package_dir="${extract_dir}/showy-quota-${VERSION}"
          make -C "${package_dir}" install-copy \
            PREFIX="${prefix}" \
            BIN_DIR="${prefix}/bin" \
            DATA_DIR="${prefix}/share/showy-quota"
          rm -rf "${package_dir}"
          export PATH="${prefix}/bin:${PATH}"
          SHOWY_QUOTA_NO_CONFIG=1 \
            "${prefix}/bin/showy-quota-zellij-bar" \
            --json "${GITHUB_WORKSPACE}/test/fixtures/codexbar-realistic.json" \
            > "${RUNNER_TEMP}/showy-quota-smoke.out"
          test -s "${RUNNER_TEMP}/showy-quota-smoke.out"
