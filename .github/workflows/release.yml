name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  zellij-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-03-27
        with:
          toolchain: stable
          targets: wasm32-wasip1
      - name: Build Zellij plugin
        run: |
          cargo build --release --target wasm32-wasip1 -p showy-quota-zellij
          cp target/wasm32-wasip1/release/showy-quota-zellij.wasm showy-quota-zellij.wasm
      - name: Write artifact checksum
        run: sha256sum showy-quota-zellij.wasm > showy-quota-zellij.wasm.sha256
      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
      - name: Check plugin exports
        run: |
          python3 - <<'PY'
          from pathlib import Path

          wasm = Path("showy-quota-zellij.wasm")
          data = wasm.read_bytes()
          assert data[:8] == b"\0asm\x01\0\0\0", "not a WebAssembly module"

          def uleb(offset):
              value = 0
              shift = 0
              while True:
                  byte = data[offset]
                  offset += 1
                  value |= (byte & 0x7F) << shift
                  if byte < 0x80:
                      return value, offset
                  shift += 7

          exports = set()
          offset = 8
          while offset < len(data):
              section_id = data[offset]
              offset += 1
              section_size, offset = uleb(offset)
              section_end = offset + section_size
              if section_id == 7:
                  count, offset = uleb(offset)
                  for _ in range(count):
                      name_len, offset = uleb(offset)
                      name = data[offset:offset + name_len].decode()
                      offset += name_len
                      offset += 1
                      _, offset = uleb(offset)
                      exports.add(name)
              offset = section_end

          required = {"_start", "load", "update", "render", "plugin_version"}
          missing = required - exports
          assert not missing, f"missing WASM exports: {sorted(missing)}"
          PY
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: showy-quota-zellij.wasm
      - name: Attach plugin artifact
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            showy-quota-zellij.wasm
            showy-quota-zellij.wasm.sha256
